display_information:
  name: calc-bot
  description: Slash command bot for arithmetic and exponent (^) calculations
  background_color: "#1f2937"
features:
  bot_user:
    display_name: calc-bot
    always_online: false
  slash_commands:
    - command: /calc
      # Replace this URL with the Workers URL from `wrangler deploy`,
      # e.g. https://calc-bot.<your-subdomain>.workers.dev/slack/calc
      url: https://REPLACE_ME.workers.dev/slack/calc
      description: Evaluate an expression (+, -, *, /, parentheses, decimals, ^)
      usage_hint: (1,000 + 500) * 2^3
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
